name: Web Polling Service 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout our repository
      uses: actions/checkout@v4

    - name: Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          # Define ANSI color codes
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          NC='\033[0m' # No Color

          echo -e "${YELLOW}---------------- PULLING CODE FROM GITHUB ----------------${NC}"
          cd web-poll
          git pull origin main
          echo -e "${GREEN}---------------- CODE PULLED FROM GITHUB -----------------${NC}"

          echo -e "${YELLOW}---------------- NAVIGATING TO POLLING DIRECTORY ----------------${NC}"
          cd polling
          
          sudo docker compose down
          echo -e "${RED}---------------- POLLING SERVICES STOPPED ----------------${NC}"
          
          sudo docker compose up --build -d
          echo -e "${GREEN}---------------- POLLING SERVICES STARTED ----------------${NC}"

          echo -e "${YELLOW}---------------- NAVIGATING TO API-GATEWAY DIRECTORY ----------------${NC}"
          cd ../api-gateway
          
          sudo docker compose down
          echo -e "${RED}---------------- API-GATEWAY SERVICES STOPPED ----------------${NC}"
          
          sudo docker compose up --build -d
          echo -e "${GREEN}---------------- API-GATEWAY SERVICES STARTED ----------------${NC}"
